<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Hero - 棍子英雄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: #87CEEB;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
        }

        #gameOver h2 {
            font-size: 48px;
            color: #ff4757;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameOver p {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        #restartBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box">分数: <span id="score">0</span></div>
            <div class="score-box">最高: <span id="highScore">0</span></div>
        </div>
        <div id="gameOver">
            <h2>游戏结束!</h2>
            <p>得分: <span id="finalScore">0</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
        <div id="instructions">按住屏幕伸长棍子，松开让棍子倒下</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');

        // 设置画布大小
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏状态
        let gameState = 'waiting'; // waiting, stretching, falling, walking, gameover
        let score = 0;
        let highScore = localStorage.getItem('stickHeroHighScore') || 0;
        highScoreElement.textContent = highScore;

        // 平台配置
        const platforms = [];
        const platformWidth = 60;
        const platformHeight = 150;
        const groundY = canvas.height - 100;

        // 棍子配置
        let stick = {
            x: 0,
            y: groundY,
            length: 0,
            angle: 0,
            width: 6
        };

        // 角色配置
        let hero = {
            x: 0,
            y: groundY - 40,
            width: 30,
            height: 40,
            speed: 5
        };

        // 当前平台索引
        let currentPlatformIndex = 0;

        // 初始化平台
        function initPlatforms() {
            platforms.length = 0;
            // 第一个平台
            platforms.push({
                x: 50,
                width: platformWidth,
                height: platformHeight
            });

            // 生成后续平台
            for (let i = 1; i < 10; i++) {
                const prevPlatform = platforms[i - 1];
                const gap = 80 + Math.random() * 150;
                const width = 40 + Math.random() * 50;

                platforms.push({
                    x: prevPlatform.x + prevPlatform.width + gap,
                    width: width,
                    height: platformHeight
                });
            }

            currentPlatformIndex = 0;
            updateHeroPosition();
        }

        // 更新角色位置
        function updateHeroPosition() {
            const currentPlatform = platforms[currentPlatformIndex];
            hero.x = currentPlatform.x + currentPlatform.width / 2 - hero.width / 2;
        }

        // 重置棍子
        function resetStick() {
            const currentPlatform = platforms[currentPlatformIndex];
            stick.x = currentPlatform.x + currentPlatform.width;
            stick.y = groundY;
            stick.length = 0;
            stick.angle = 0;
        }

        // 绘制背景
        function drawBackground() {
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 云朵
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(100, 80, 60);
            drawCloud(300, 120, 40);
            drawCloud(200, 50, 50);
        }

        // 绘制云朵
        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制平台
        function drawPlatforms() {
            platforms.forEach((platform, index) => {
                // 平台主体
                const gradient = ctx.createLinearGradient(platform.x, groundY, platform.x, groundY + platform.height);
                gradient.addColorStop(0, '#8B4513');
                gradient.addColorStop(1, '#654321');
                ctx.fillStyle = gradient;
                ctx.fillRect(platform.x, groundY, platform.width, platform.height);

                // 平台顶部
                ctx.fillStyle = '#228B22';
                ctx.fillRect(platform.x, groundY, platform.width, 10);

                // 平台边框
                ctx.strokeStyle = '#5D3A1A';
                ctx.lineWidth = 2;
                ctx.strokeRect(platform.x, groundY, platform.width, platform.height);
            });
        }

        // 绘制棍子
        function drawStick() {
            ctx.save();
            ctx.translate(stick.x, stick.y);
            ctx.rotate(stick.angle);

            // 棍子主体
            const gradient = ctx.createLinearGradient(0, 0, 0, -stick.length);
            gradient.addColorStop(0, '#8B4513');
            gradient.addColorStop(1, '#D2691E');
            ctx.fillStyle = gradient;
            ctx.fillRect(-stick.width / 2, -stick.length, stick.width, stick.length);

            // 棍子头部
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.arc(0, -stick.length, stick.width / 2 + 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 绘制角色
        function drawHero() {
            // 身体
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(hero.x, hero.y, hero.width, hero.height);

            // 头部
            ctx.fillStyle = '#FFE66D';
            ctx.beginPath();
            ctx.arc(hero.x + hero.width / 2, hero.y - 10, 15, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(hero.x + hero.width / 2 - 5, hero.y - 12, 3, 0, Math.PI * 2);
            ctx.arc(hero.x + hero.width / 2 + 5, hero.y - 12, 3, 0, Math.PI * 2);
            ctx.fill();

            // 微笑
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(hero.x + hero.width / 2, hero.y - 8, 6, 0, Math.PI);
            ctx.stroke();
        }

        // 绘制分数
        function drawScore() {
            scoreElement.textContent = score;
        }

        // 游戏主循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawPlatforms();
            drawStick();
            drawHero();
            drawScore();

            updateGame();

            requestAnimationFrame(gameLoop);
        }

        // 更新游戏逻辑
        function updateGame() {
            if (gameState === 'stretching') {
                stick.length += 3;
            } else if (gameState === 'falling') {
                stick.angle += 0.05;
                if (stick.angle >= Math.PI / 2) {
                    stick.angle = Math.PI / 2;
                    gameState = 'walking';
                    checkSuccess();
                }
            } else if (gameState === 'walking') {
                hero.x += hero.speed;

                const currentPlatform = platforms[currentPlatformIndex];
                const nextPlatform = platforms[currentPlatformIndex + 1];

                // 检查是否走到下一个平台
                if (hero.x + hero.width >= nextPlatform.x &&
                    hero.x < nextPlatform.x + nextPlatform.width) {
                    // 成功到达下一个平台
                    score++;
                    currentPlatformIndex++;

                    // 移动所有平台
                    const shift = nextPlatform.x - 50;
                    platforms.forEach(p => p.x -= shift);
                    hero.x -= shift;
                    stick.x -= shift;

                    // 生成新平台
                    const lastPlatform = platforms[platforms.length - 1];
                    const gap = 80 + Math.random() * 150;
                    const width = 40 + Math.random() * 50;
                    platforms.push({
                        x: lastPlatform.x + lastPlatform.width + gap,
                        width: width,
                        height: platformHeight
                    });

                    // 移除过远的平台
                    if (platforms.length > 10) {
                        platforms.shift();
                        currentPlatformIndex--;
                    }

                    gameState = 'waiting';
                    resetStick();
                } else if (hero.x > canvas.width) {
                    // 掉出屏幕
                    gameOver();
                }
            }
        }

        // 检查是否成功
        function checkSuccess() {
            const currentPlatform = platforms[currentPlatformIndex];
            const nextPlatform = platforms[currentPlatformIndex + 1];
            const stickEndX = stick.x + stick.length;

            if (stickEndX >= nextPlatform.x &&
                stickEndX <= nextPlatform.x + nextPlatform.width + 10) {
                // 成功
            } else {
                // 失败，角色会继续走直到掉下去
            }
        }

        // 游戏结束
        function gameOver() {
            gameState = 'gameover';
            finalScoreElement.textContent = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('stickHeroHighScore', highScore);
                highScoreElement.textContent = highScore;
            }

            gameOverElement.style.display = 'block';
        }

        // 重新开始
        function restart() {
            score = 0;
            gameOverElement.style.display = 'none';
            gameState = 'waiting';
            initPlatforms();
            resetStick();
        }

        // 事件监听
        let isPressing = false;

        function startPress() {
            if (gameState === 'waiting') {
                gameState = 'stretching';
                isPressing = true;
            }
        }

        function endPress() {
            if (gameState === 'stretching') {
                gameState = 'falling';
                isPressing = false;
            }
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', startPress);
        canvas.addEventListener('mouseup', endPress);
        canvas.addEventListener('mouseleave', endPress);

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPress();
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            endPress();
        });

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isPressing) {
                startPress();
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                endPress();
            }
        });

        restartBtn.addEventListener('click', restart);

        // 初始化游戏
        initPlatforms();
        resetStick();
        gameLoop();
    </script>
</body>
</html>
